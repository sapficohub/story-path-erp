<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FICO Interview Questions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark:  #02102b;
      --purple-mid:   #06265f;
      --purple-light: #0f4c81;
      --accent:       #38bdf8;
      --bg:           #02102b;
      --surface:      #ffffff;
      --border:       #d8e7f5;
      --text:         #0f172a;
      --text-muted:   #6b7280;
      --success:      #16a34a;
      --success-bg:   #f0fdf4;
      --success-bd:   #86efac;
      --danger:       #dc2626;
      --danger-bg:    #fff1f2;
      --danger-bd:    #fca5a5;
      --option-bg:    #f5faff;
      --option-hover: #e0f2fe;
      --radius:       14px;
      --shadow:       0 14px 36px rgba(0,0,0,0.28);
      --display-font: "Segoe UI Light", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      font-family: var(--display-font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    .sap-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(56,189,248,0.10) 1px, transparent 1px),
        linear-gradient(0deg, rgba(147,197,253,0.07) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(56,189,248,0.16), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(14,165,233,0.13), transparent 30%),
        #02102b;
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
      animation: ledgerGrid 16s linear infinite;
    }

    .sap-bg::before,
    .sap-bg::after {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        linear-gradient(115deg, transparent 0 43%, rgba(56,189,248,0.14) 44% 45%, transparent 46% 100%),
        linear-gradient(65deg, transparent 0 52%, rgba(147,197,253,0.10) 53% 54%, transparent 55% 100%);
      animation: accountFlow 18s linear infinite;
    }

    .sap-bg::after {
      animation-duration: 26s;
      animation-direction: reverse;
      opacity: 0.55;
    }

    .sap-chip {
      position: absolute;
      left: var(--x);
      top: 110%;
      min-width: 74px;
      border: 1px solid rgba(56,189,248,0.26);
      border-radius: 8px;
      padding: 0.45rem 0.7rem;
      background: rgba(255,255,255,0.10);
      color: rgba(226,242,255,0.58);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-align: center;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      animation: ficoFloat var(--dur) linear infinite;
      animation-delay: var(--delay);
    }

    .sap-chip:nth-child(1) { --x: 7%; --dur: 22s; --delay: -2s; }
    .sap-chip:nth-child(2) { --x: 18%; --dur: 28s; --delay: -12s; }
    .sap-chip:nth-child(3) { --x: 31%; --dur: 24s; --delay: -6s; }
    .sap-chip:nth-child(4) { --x: 45%; --dur: 30s; --delay: -18s; }
    .sap-chip:nth-child(5) { --x: 58%; --dur: 25s; --delay: -9s; }
    .sap-chip:nth-child(6) { --x: 72%; --dur: 32s; --delay: -16s; }
    .sap-chip:nth-child(7) { --x: 84%; --dur: 26s; --delay: -4s; }
    .sap-chip:nth-child(8) { --x: 12%; --dur: 34s; --delay: -24s; }
    .sap-chip:nth-child(9) { --x: 65%; --dur: 29s; --delay: -22s; }
    .sap-chip:nth-child(10) { --x: 91%; --dur: 23s; --delay: -11s; }

    .sap-chip:nth-child(2n) {
      border-color: rgba(147,197,253,0.22);
      color: rgba(219,234,254,0.58);
    }

    @keyframes ledgerGrid {
      from { background-position: 0 0, 0 0, 0 0, 0 0; }
      to   { background-position: 48px 48px, -48px 48px, 0 0, 0 0; }
    }

    @keyframes accountFlow {
      from { transform: translate3d(-6%, -4%, 0); }
      to   { transform: translate3d(6%, 4%, 0); }
    }

    @keyframes ficoFloat {
      0%   { transform: translateY(0) rotate(-3deg); opacity: 0; }
      12%  { opacity: 1; }
      82%  { opacity: 1; }
      100% { transform: translateY(-125vh) rotate(4deg); opacity: 0; }
    }

    /* ═══════════════════════════════
       HERO HEADER
    ═══════════════════════════════ */
    .quiz-hero {
      width: 100%;
      background: transparent;
      color: #fff;
      padding: 1.9rem 1.5rem 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .hero-logo {
      display: block;
      width: min(220px, 52vw);
      height: auto;
      margin: 0 auto 1.1rem;
      filter: drop-shadow(0 16px 30px rgba(0,0,0,0.35));
    }
    .quiz-hero h1 {
      font-size: clamp(44px, 7vw, 76px);
      font-family: var(--display-font);
      font-weight: 300;
      line-height: 0.98;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
      text-shadow: 0 18px 45px rgba(0,0,0,0.26);
    }
    .quiz-hero h1 strong {
      font-weight: 700;
    }
    .quiz-hero h1 .gold {
      display: inline;
      color: #ffcf43;
    }
    .quiz-hero .hero-sub {
      display: none;
    }

    /* Progress bar inside hero */
    .hero-progress-track {
      width: 100%;
      max-width: 480px;
      height: 7px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      margin: 0 auto 0.6rem;
      overflow: hidden;
    }
    .hero-progress-fill {
      height: 100%;
      width: 0;
      background: #fff;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .question-type-label { color: #38bdf8; font-weight: 700; }
    .hero-progress-label {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.8;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 0.65rem;
      margin-top: 0.85rem;
      flex-wrap: wrap;
    }

    .hero-stat {
      min-width: 98px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      background: rgba(255,255,255,0.12);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .hero-stat-value {
      display: block;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    .hero-stat-label {
      display: block;
      margin-top: 0.25rem;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0.72;
    }

    body.start-mode .hero-progress-track,
    body.start-mode .hero-progress-label,
    body.start-mode .hero-stats {
      display: none;
    }

    body.start-mode .quiz-hero {
      padding: 0.8rem 1rem 0.7rem;
    }

    body.start-mode .hero-logo {
      width: min(150px, 38vw);
      margin-bottom: 0.45rem;
    }

    body.start-mode .quiz-hero h1 {
      font-size: clamp(34px, 5.4vw, 58px);
      margin-bottom: 0;
    }

    /* ═══════════════════════════════
       CARD BODY
    ═══════════════════════════════ */
    .quiz-body {
      width: 100%;
      max-width: 660px;
      padding: 0 1rem 1rem;
      margin-top: -0.4rem;
      position: relative;
      z-index: 1;
    }

    body.start-mode .quiz-body {
      max-width: 960px;
      margin-top: 0;
      padding-bottom: 1rem;
    }

    .start-card {
      max-width: 960px;
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 28px;
      padding: clamp(1.2rem, 3vw, 2rem);
      text-align: center;
      color: #fff;
      background:
        radial-gradient(circle at 50% 16%, rgba(37,99,235,0.20), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      box-shadow: 0 24px 80px rgba(0,0,0,0.38);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .start-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 18px 46px rgba(37,99,235,0.34);
      font-size: 42px;
    }

    .start-title {
      font-size: clamp(24px, 4vw, 40px);
      font-family: var(--display-font);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1.08;
      margin-bottom: 0.9rem;
    }

    .topic-picker {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
      max-width: 640px;
      margin: 0 auto 1rem;
      text-align: left;
    }

    .topic-field {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .topic-field label {
      color: rgba(255,255,255,0.68);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .topic-select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 12px;
      padding: 0.85rem 0.95rem;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      outline: none;
    }

    .topic-select option {
      color: #0f172a;
      background: #fff;
    }

    .topic-count {
      margin: -0.25rem auto 1rem;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border: none;
      border-radius: 999px;
      padding: 0.85rem 2.25rem;
      background: linear-gradient(135deg, #2684ff, #1d6ff2);
      color: #fff;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 18px 44px rgba(37,99,235,0.35);
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .start-btn:hover { transform: translateY(-2px); }
    .start-btn:active { transform: scale(0.98); }

    .question-card {
      background: var(--surface);
      border: 1px solid rgba(216,231,245,0.95);
      border-radius: 14px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
      padding: 1.3rem 1.65rem 1.25rem;
      margin-bottom: 0.6rem;
    }

    .question-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-align: center;
      margin-top: 0;
      margin-bottom: 0.35rem;
    }

    .question-topic {
      margin: 0 0 0.65rem;
      color: #64748b;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.45;
    }

    .question-text {
      font-size: clamp(18px, 2.4vw, 22px);
      font-weight: 950;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 1rem;
    }

    /* ── Multiple-choice options ── */
    .mc-options { display: flex; flex-direction: column; gap: 9px; }

    .mc-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--option-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 0.68rem 0.95rem;
      font-size: 17px;
      font-weight: 650;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.13s, border-color 0.13s, transform 0.08s;
    }
    .mc-btn:hover:not(:disabled) {
      background: var(--option-hover);
      border-color: var(--accent);
      transform: translateX(3px);
    }
    .mc-btn:active:not(:disabled) { transform: scale(0.99); }
    .mc-btn:disabled { cursor: default; }

    .mc-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #d7d1ff;
      color: #0f4c81;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
      transition: background 0.13s, color 0.13s;
    }

    .mc-btn.correct { background: #ecfdf3; border-color: var(--success); color: var(--success); }
    .mc-btn.correct .mc-letter { background: var(--success); color: #fff; }
    .mc-btn.wrong   { background: var(--danger-bg);  border-color: var(--danger);  color: var(--danger); opacity: 0.65; }
    .mc-btn.wrong .mc-letter   { background: var(--danger); color: #fff; }

    .confetti-piece {
      position: fixed;
      left: var(--x);
      top: var(--y);
      z-index: 120;
      width: 8px;
      height: 13px;
      border-radius: 2px;
      background: var(--c);
      pointer-events: none;
      animation: confettiPop 1200ms ease-out forwards;
    }

    @keyframes confettiPop {
      0% { transform: translate3d(0,0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate3d(var(--dx), var(--dy), 0) rotate(220deg); opacity: 0; }
    }

    /* ── Yes / No options ── */
    .yn-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .yn-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0.9rem 0.75rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--option-bg);
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      transition: all 0.13s;
    }
    .yn-btn .yn-icon { font-size: 26px; line-height: 1; }
    .yn-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(2,16,43,0.22); }
    .yn-btn:active:not(:disabled) { transform: scale(0.97); }
    .yn-btn:disabled { cursor: default; opacity: 0.8; }

    .yn-btn.yes-btn:hover:not(:disabled) { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .yn-btn.no-btn:hover:not(:disabled)  { background: var(--danger-bg);  border-color: var(--danger);  color: var(--danger); }
    .yn-btn.correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
    .yn-btn.wrong   { background: var(--danger-bg);  border-color: var(--danger);  color: var(--danger); opacity: 0.6; }

    /* ── Shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* ── Hint ── */
    .hint-text {
      display: none;
      margin-top: 0.7rem;
      padding: 0.5rem 0.8rem;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid var(--danger-bd);
      text-align: center;
    }
    .hint-text.show { display: block; }

    /* ── Explanation ── */
    .explanation {
      display: none;
      margin-top: 0.9rem;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.45;
      background: #ecfdf3;
      border: 1px solid #6ee7a0;
      color: #166534;
    }
    .explanation.show { display: block; }
    .expl-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.09em;
      color: var(--success);
      margin-bottom: 4px;
    }

    /* ── Next button ── */
    .next-wrap { display: flex; justify-content: center; margin-top: 0.2rem; }
    .next-btn {
      display: none;
      background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1.25rem;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(2,16,43,0.32);
      transition: opacity 0.15s, transform 0.1s;
    }
    .next-btn:hover { opacity: 0.88; }
    .next-btn:active { transform: scale(0.97); }
    .next-btn.show { display: inline-block; }

    /* ═══════════════════════════════
       RESULT SCREEN
    ═══════════════════════════════ */
    .result-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .result-emoji { font-size: 56px; margin-bottom: 0.75rem; }
    .result-score-lbl {
      font-size: 12px; font-weight: 700; letter-spacing: 0.09em;
      color: var(--text-muted); margin-bottom: 4px;
    }
    .result-score {
      font-size: 52px; font-weight: 900; letter-spacing: -0.04em;
      color: var(--text); margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .result-msg { font-size: 15px; color: var(--text-muted); line-height: 1.6; max-width: 360px; margin: 0 auto 1.75rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.75rem; }
    .stat-box { background: var(--option-bg); border-radius: 10px; padding: 0.9rem 0.5rem; border: 1px solid var(--border); }
    .stat-val { font-size: 26px; font-weight: 800; color: var(--text); }
    .stat-val.green { color: var(--success); }
    .stat-val.red   { color: var(--danger); }
    .stat-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; color: var(--text-muted); margin-top: 3px; }

    .restart-btn {
      background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
      color: #fff; border: none; border-radius: 10px;
      padding: 0.8rem 2.2rem; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 14px rgba(2,16,43,0.32);
      transition: opacity 0.15s;
    }
    .restart-btn:hover { opacity: 0.88; }

    /* ── Oops Popup Overlay ── */
    .oops-overlay,
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2,16,43,0.74);
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .oops-overlay.show,
    .success-overlay.show { display: flex; }

    @keyframes popIn {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .oops-box,
    .success-box {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(2,16,43,0.38);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .success-box {
      background: transparent;
      box-shadow: none;
      color: #fff;
    }

    .oops-emoji,
    .success-emoji {
      font-size: 60px;
      line-height: 1;
      margin-bottom: 0.75rem;
      display: block;
    }

    .success-emoji {
      font-size: 88px;
      filter: drop-shadow(0 16px 28px rgba(0,0,0,0.28));
    }

    .oops-title,
    .success-title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .oops-title { color: var(--danger); }
    .success-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 146px;
      border-radius: 999px;
      padding: 0.85rem 1.5rem;
      background: #16a34a;
      color: #fff;
      box-shadow: 0 14px 34px rgba(22,163,74,0.32);
    }

    .oops-sub,
    .success-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }

    .success-sub {
      margin-top: 1rem;
      color: rgba(255,255,255,0.72);
      font-weight: 800;
    }

    .oops-try-btn {
      background: linear-gradient(135deg, #dc2626, #f97316);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 2rem;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 14px rgba(220,38,38,0.35);
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .oops-try-btn:hover  { opacity: 0.9; }
    .oops-try-btn:active { transform: scale(0.97); }

    .hint-text { display: none !important; }

    @media (max-width: 420px) {
      .question-text { font-size: 16px; }
      .question-card { padding: 1.25rem; }

const LABELS = ['A','B','C','D'];
const SECTION_ORDER = [
  'General Ledger',
  'Accounts Payable',
  'P2P Cycle',
  'AR & O2C',
  'Controlling',
  'S/4HANA & Project'
];
const SUBCLASS_ORDER = {
  'General Ledger': [
    'SAP FICO Enterprise Structure',
    'General Ledger Accounting (New)',
    'Financial Accounting Global Settings (New)',
    'Accounting Concepts',
    'Controlling',
    'Master data'
  ]
};
let current = 0, score = 0, triedWrong = false;
let streak = 0, bestStreak = 0;
let selectedSection = 'ALL', selectedSubclass = 'ALL';
let pool = []; // shuffled question pool for the current cycle

const root      = document.getElementById('quiz-root');
const heroFill  = document.getElementById('hero-fill');
const heroLabel = document.getElementById('hero-label');
const heroTitle = document.getElementById('hero-title');
const heroSub   = document.getElementById('hero-sub');
const streakValue = document.getElementById('streak-value');
const bestStreakValue = document.getElementById('best-streak-value');

// Fisher-Yates shuffle — returns a new shuffled copy, never mutates original
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle a single MC question's options and update the correct-answer index
function shuffleOpts(q) {
  if (q.type !== 'mc') return { ...q };
  // pair each option text with whether it is the correct answer
  const pairs = q.opts.map((opt, i) => ({ opt, correct: i === q.ans }));
  const shuffled = shuffleArray(pairs);
  return {
    ...q,
    opts: shuffled.map(p => p.opt),
    ans:  shuffled.findIndex(p => p.correct)
  };
}

// Build a fresh pool for one cycle:
// 1. Shuffle question order
// 2. For every MC question, also shuffle its answer options
function getFilteredQuestions() {
  return QUESTIONS.filter(q =>
    (selectedSection === 'ALL' || q.section === selectedSection) &&
    (selectedSubclass === 'ALL' || q.subclass === selectedSubclass)
  );
}

function buildPool() {
  return shuffleArray(getFilteredQuestions()).map(q => shuffleOpts(q));
}

function uniqueSorted(items) {
  return [...new Set(items.filter(Boolean))].sort((a, b) => a.localeCompare(b));
}

function sectionOptions() {
  const available = new Set(QUESTIONS.map(q => q.section));
  return ['ALL', ...SECTION_ORDER.filter(section => available.has(section))];
}

function subclassOptions() {
  const scoped = selectedSection === 'ALL'
    ? QUESTIONS
    : QUESTIONS.filter(q => q.section === selectedSection);
  const available = new Set(scoped.map(q => q.subclass).filter(Boolean));
  const preferred = SUBCLASS_ORDER[selectedSection] || [];
  const ordered = preferred.filter(subclass => available.has(subclass));
  const remaining = uniqueSorted([...available].filter(subclass => !preferred.includes(subclass)));
  return ['ALL', ...ordered, ...remaining];
}

function optionLabel(value, allLabel) {
  return value === 'ALL' ? allLabel : value;
}

function renderSelectOptions(values, selected, allLabel) {
  return values.map(value => `
    <option value="${value}" ${value === selected ? 'selected' : ''}>${optionLabel(value, allLabel)}</option>
  `).join('');
}

function renderStart() {
  document.body.classList.add('start-mode');
  const available = getFilteredQuestions().length;
  heroFill.style.width = '0%';
  heroLabel.textContent = '';
  heroTitle.innerHTML = 'SAP FICO <span class="gold">Challenge</span>';
  heroSub.textContent = '';
  streakValue.textContent = 0;
  bestStreakValue.textContent = 0;
  root.innerHTML = `
    <div class="start-card">
      <div class="start-icon">🎯</div>
      <div class="start-title">${available} Questions · 1 Score · ∞ Bragging Rights</div>
      <div class="topic-picker">
        <div class="topic-field">
          <label for="section-select">Section</label>
          <select class="topic-select" id="section-select" onchange="changeSection(this.value)">
            ${renderSelectOptions(sectionOptions(), selectedSection, 'All Sections')}
          </select>
        </div>
        <div class="topic-field">
          <label for="subclass-select">Subclass</label>
          <select class="topic-select" id="subclass-select" onchange="changeSubclass(this.value)">
            ${renderSelectOptions(subclassOptions(), selectedSubclass, 'All Subclasses')}
          </select>
        </div>
      </div>
      <div class="topic-count">${available} questions selected</div>
      <button class="start-btn" onclick="startChallenge()">Start the Challenge <span>→</span></button>
    </div>
  `;
}

function changeSection(value) {
  selectedSection = value;
  selectedSubclass = 'ALL';
  renderStart();
}

function changeSubclass(value) {
  selectedSubclass = value;
  renderStart();
}

function startChallenge() {
  document.body.classList.remove('start-mode');
  current = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;
  pool = buildPool();
  if (!pool.length) {
    renderStart();
    return;
  }
  render();
}

function updateHero(pct, qNum, total) {
  heroFill.style.width = pct + '%';
  heroLabel.textContent = `Question ${qNum} of ${total}`;
  heroTitle.innerHTML = 'SAP FICO <span class="gold">Challenge</span>';
  heroSub.textContent   = `${score} correct so far`;
  streakValue.textContent = streak;
  bestStreakValue.textContent = bestStreak;
}

function render() {
  document.body.classList.remove('start-mode');
  if (current >= pool.length) { renderResult(); return; }

  const q   = pool[current];
  const pct = Math.round((current / pool.length) * 100);
  triedWrong = false;

  updateHero(pct, current + 1, pool.length);

  const typeTag = q.type === 'yn'
    ? '<span class="question-type-label">Yes / No</span>'
    : '<span class="question-type-label">Multiple Choice</span>';

  root.innerHTML = `
    <div class="question-card" id="q-card">
      <div class="question-label">Question ${current + 1} &nbsp;·&nbsp; ${typeTag}</div>
      <div class="question-topic">${q.section} &nbsp;·&nbsp; ${q.subclass}</div>
      <div class="question-text">${q.q}</div>
      ${q.type === 'mc' ? buildMC(q) : buildYN()}
      <div class="hint-text" id="hint">That's not right — try again!</div>
      <div class="explanation" id="expl"></div>
    </div>
    <div class="next-wrap">
      <button class="next-btn" id="next-btn" onclick="advance()">
        ${current + 1 === pool.length ? 'See results \u2192' : 'Next question \u2192'}
      </button>
    </div>
  `;
}

function buildMC(q) {
  return `<div class="mc-options">
    ${q.opts.map((opt, i) => `
      <button class="mc-btn" id="mc-${i}" onclick="pickMC(${i})">
        <span class="mc-letter">${LABELS[i]}</span>${opt}
      </button>`).join('')}
  </div>`;
}

function buildYN() {
  return `<div class="yn-options">
    <button class="yn-btn yes-btn" id="btn-yes" onclick="pickYN(true)">
      <span class="yn-icon">\u2705</span>Yes
    </button>
    <button class="yn-btn no-btn" id="btn-no" onclick="pickYN(false)">
      <span class="yn-icon">\u274c</span>No
    </button>
  </div>`;
}

function onCorrect(el) {
  if (!triedWrong) score++;
  streak++;
  bestStreak = Math.max(bestStreak, streak);
  document.querySelectorAll('.mc-btn, .yn-btn').forEach(b => b.disabled = true);
  el.classList.add('correct');
  showSuccess();
  launchConfetti(el);
  document.getElementById('hint').classList.remove('show');
  const expl = document.getElementById('expl');
  expl.innerHTML = `<div class="expl-title">\ud83d\udca1 Explanation</div>${pool[current].fact}`;
  expl.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  heroSub.textContent = `${score} correct so far`;
  streakValue.textContent = streak;
  bestStreakValue.textContent = bestStreak;
}

function onWrong(el) {
  triedWrong = true;
  streak = 0;
  streakValue.textContent = streak;
  el.classList.add('wrong');
  el.disabled = true;
  const card = document.getElementById('q-card');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  document.getElementById('oops-overlay').classList.add('show');
}

function closeOops() {
  document.getElementById('oops-overlay').classList.remove('show');
}

function showSuccess() {
  const popup = document.getElementById('success-overlay');
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 900);
}

function launchConfetti(origin) {
  const rect = origin.getBoundingClientRect();
  const colors = ['#1d4ed8', '#38bdf8', '#facc15', '#22c55e', '#94a3b8'];
  for (let i = 0; i < 52; i++) {
    const piece = document.createElement('span');
    const angle = (Math.PI * 2 * i) / 52;
    const distance = 120 + Math.random() * 280;
    piece.className = 'confetti-piece';
    piece.style.setProperty('--x', `${rect.left + rect.width / 2 + (Math.random() - 0.5) * 220}px`);
    piece.style.setProperty('--y', `${rect.top + rect.height / 2 + (Math.random() - 0.5) * 120}px`);
    piece.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
    piece.style.setProperty('--dy', `${Math.sin(angle) * distance - 80}px`);
    piece.style.setProperty('--c', colors[i % colors.length]);
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 1250);
  }
}

function pickMC(idx) {
  const btn = document.getElementById(`mc-${idx}`);
  if (!btn || btn.disabled) return;
  idx === pool[current].ans ? onCorrect(btn) : onWrong(btn);
}

function pickYN(val) {
  const btn = document.getElementById(val ? 'btn-yes' : 'btn-no');
  if (!btn || btn.disabled) return;
  val === pool[current].ans ? onCorrect(btn) : onWrong(btn);
}

function advance() {
  current++;
  // Re-shuffle the next MC question's options so every visit is fresh
  if (current < pool.length && pool[current].type === 'mc') {
    pool[current] = shuffleOpts(pool[current]);
  }
  render();
}

function renderResult() {
  const pct = Math.round((score / pool.length) * 100);
  heroFill.style.width = '100%';
  heroLabel.textContent = 'Quiz Complete!';
  heroSub.textContent   = `Final score: ${score} / ${pool.length}`;

  const tiers = [
    { max: 40,  emoji: '\ud83d\ude05', msg: "Keep going — every expert started somewhere!" },
    { max: 65,  emoji: '\ud83d\ude42', msg: "Not bad! You have a solid SAP FICO base." },
    { max: 85,  emoji: '\ud83d\ude0a', msg: "Great work! You are strong on SAP FICO concepts." },
    { max: 100, emoji: '\ud83c\udfc6', msg: "Outstanding! You are ready for SAP FICO interview questions." }
  ];
  const t = tiers.find(x => pct <= x.max) || tiers[tiers.length - 1];

  root.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${t.emoji}</div>
      <div class="result-score-lbl">Your final score</div>
      <div class="result-score">${score} / ${pool.length}</div>
      <p class="result-msg">${t.msg}</p>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val green">${score}</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-box"><div class="stat-val red">${pool.length - score}</div><div class="stat-lbl">Wrong</div></div>
        <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Accuracy</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">Play again</button>
    </div>
  `;
}

// Each new game gets a freshly shuffled pool
function restart() { renderStart(); }

renderStart();
